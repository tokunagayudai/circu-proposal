<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" role="img" aria-label="Microsoft 365 × AI BPR支援 のスライドイメージ">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="6" fill="#0079c0"/>
  <!-- title -->
  <rect x="56" y="60" width="10" height="52" rx="2" fill="#0079c0"/>
  <text x="86" y="102" font-size="44" font-weight="700" fill="#003d5e">Microsoft 365 × AI BPR支援</text>
  <line x1="56" y1="140" x2="1224" y2="140" stroke="#d6e6f2" stroke-width="2"/>
  <!-- value band -->
  <rect x="56" y="176" width="1168" height="78" rx="6" fill="#0079c0"/>
  <text x="640" y="225" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">Copilotを前提に業務プロセスを再設計し、現場定着まで伴走</text>
  <!-- phase boxes -->
  <g>
    <!-- box1 -->
    <rect x="56" y="330" width="352" height="300" rx="10" fill="#f1f7fc" stroke="#cfe3f0" stroke-width="2"/>
    <rect x="56" y="330" width="352" height="64" rx="10" fill="#003d5e"/>
    <rect x="56" y="372" width="352" height="22" fill="#003d5e"/>
    <text x="232" y="372" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">STEP 1</text>
    <text x="232" y="500" font-size="26" font-weight="700" fill="#003d5e" text-anchor="middle">業務棚卸し・課題特定</text>
    <!-- box2 -->
    <rect x="464" y="330" width="352" height="300" rx="10" fill="#f1f7fc" stroke="#cfe3f0" stroke-width="2"/>
    <rect x="464" y="330" width="352" height="64" rx="10" fill="#0a6e8c"/>
    <rect x="464" y="372" width="352" height="22" fill="#0a6e8c"/>
    <text x="640" y="372" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">STEP 2</text>
    <text x="640" y="500" font-size="26" font-weight="700" fill="#003d5e" text-anchor="middle">M365×AIで再設計</text>
    <!-- box3 -->
    <rect x="872" y="330" width="352" height="300" rx="10" fill="#f1f7fc" stroke="#cfe3f0" stroke-width="2"/>
    <rect x="872" y="330" width="352" height="64" rx="10" fill="#0079c0"/>
    <rect x="872" y="372" width="352" height="22" fill="#0079c0"/>
    <text x="1048" y="372" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">STEP 3</text>
    <text x="1048" y="500" font-size="26" font-weight="700" fill="#003d5e" text-anchor="middle">実装・現場定着</text>
    <!-- arrows -->
    <path d="M420 480 l28 0 l0 -12 l24 16 l-24 16 l0 -12 l-28 0 z" fill="#5599be"/>
    <path d="M828 480 l28 0 l0 -12 l24 16 l-24 16 l0 -12 l-28 0 z" fill="#5599be"/>
  </g>
  <text x="1224" y="688" font-size="18" fill="#9bb3c4" text-anchor="end">© CIRCULATION</text>
</svg>
