<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>サーキュレーション 提案ポータル</title>

  <!-- Favicon（CIRCULATION ロゴマーク） -->
  <link rel="icon" type="image/png" href="images/favicon.png?v=20260716n">
  <link rel="apple-touch-icon" href="images/favicon.png?v=20260716n">

  <!-- フォント：Noto Sans JP（社外向けの落ち着いたトーン）＋ JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">

  <link rel="stylesheet" href="styles.css?v=20260721j">
</head>
<body>

  <!-- ========== 上部セクションナビ ========== -->
  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-brand"><i class="ti ti-bulb"></i>提案ポータル</div>
      <div class="nav-links">
        <a href="#pickup">直近ピックアップ</a>
        <a href="#catalog">経営テーマ</a>
        <a href="#solutions">プロジェクト体制</a>
        <a href="#cases">事例</a>
        <a href="#service-doc">サービス資料</a>
      </div>
      <img class="nav-logo" src="images/circu-logo.png?v=20260715c" alt="CIRCULATION">
    </div>
  </nav>

  <main>

    <!-- ========== セクション1：直近ピックアップテーマ ========== -->
    <section class="section" id="pickup">
      <div class="section-head">
        <i class="ti ti-flame"></i>
        <div>
          <div class="section-eyebrow">Pick Up</div>
          <h2>直近ピックアップテーマ</h2>
        </div>
      </div>
      <div class="pickup-grid" id="pickup-grid"></div>
    </section>

    <!-- ========== セクション2：経営テーマから探す（単一のテーマ入口） ========== -->
    <section class="section" id="catalog">
      <div class="section-head">
        <i class="ti ti-layout-grid"></i>
        <div>
          <div class="section-eyebrow">Explore by Theme</div>
          <h2>経営テーマから探す</h2>
        </div>
      </div>
      <div id="cases-stat"></div>
      <div class="theme-search">
        <i class="ti ti-search"></i>
        <input type="text" id="theme-search-input" placeholder="テーマ・キーワードで探す（例：採用 / ERP / ESG / 海外）" aria-label="経営テーマを検索">
      </div>
      <div class="agenda-map" id="agenda-map"></div>
      <p class="theme-empty" id="theme-empty" hidden>該当するテーマが見つかりませんでした。</p>
    </section>

    <!-- ========== セクション3：プロジェクト体制例 ========== -->
    <section class="section" id="solutions">
      <div class="section-head">
        <i class="ti ti-sitemap"></i>
        <div>
          <div class="section-eyebrow">Project Structure</div>
          <h2>プロジェクト体制例</h2>
        </div>
      </div>
      <div class="assign-grid" id="assign-grid"></div>
    </section>

    <!-- ========== セクション4：事例 ========== -->
    <section class="section" id="cases">
      <div class="section-head">
        <i class="ti ti-briefcase"></i>
        <div>
          <div class="section-eyebrow">Cases</div>
          <h2>事例</h2>
        </div>
      </div>
      <div class="subhead">
        <i class="ti ti-building"></i>社名あり事例
        <span class="note">出典：自社HP事例ページ</span>
      </div>
      <div class="case-grid" id="cases-named"></div>
    </section>

    <!-- ========== セクション5：サーキュレーションサービス資料 ========== -->
    <section class="section" id="service-doc">
      <div class="section-head">
        <i class="ti ti-file-description"></i>
        <div>
          <div class="section-eyebrow">Service Deck</div>
          <h2>サーキュレーションサービス資料</h2>
        </div>
      </div>
      <div class="doc-embed">
        <iframe
          src="https://docs.google.com/presentation/d/16wdSQTqhwURzrM9f9UUI4hvSy-RKT2YrOPoptgGD8Js/embed?start=false&loop=false&delayms=3000"
          title="サーキュレーション サービス資料" allowfullscreen loading="lazy"></iframe>
      </div>
      <div class="doc-actions">
        <a class="doc-dl" href="https://docs.google.com/presentation/d/16wdSQTqhwURzrM9f9UUI4hvSy-RKT2YrOPoptgGD8Js/export/pdf" target="_blank" rel="noopener">
          <i class="ti ti-download"></i>PDFをダウンロード
        </a>
      </div>
    </section>

    <!-- ========== お問い合わせ CTA ========== -->
    <section class="section contact-cta" id="contact">
      <h2>ご相談・お問い合わせ</h2>
      <p>プロ人材の活用や経営テーマのご相談は、以下よりお気軽にお問い合わせください。</p>
      <a class="contact-btn" href="https://circu.co.jp/pro-sharing/inquiry/consultation/" target="_blank" rel="noopener">
        <i class="ti ti-mail"></i>問い合わせ
      </a>
    </section>

  </main>

  <footer class="footer">
    <img class="footer-logo" src="images/circu-logo.png?v=20260715c" alt="CIRCULATION">
    <div class="brand">株式会社サーキュレーション</div>
  </footer>

  <!-- ========== テーマ詳細モーダル ========== -->
  <div class="modal-overlay" id="theme-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="閉じる"><i class="ti ti-x"></i></button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="app.js?v=20260721j"></script>
</body>
</html>
